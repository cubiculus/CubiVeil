<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{SITE_NAME}} - Восстановление пароля</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <span class="logo-icon">📁</span>
                <h1>{{SITE_NAME}}</h1>
                <p>Восстановление пароля</p>
            </div>

            <form id="forgot-form" class="login-form">
                <p class="form-description">
                    Введите ваш email, и мы отправим инструкции по восстановлению пароля.
                </p>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Отправить инструкции</button>

                <div id="error-message" class="error-message" style="display: none;"></div>
                <div id="success-message" class="success-message" style="display: none;">
                    ✓ Если аккаунт с таким email существует, вы получите инструкции.
                </div>
            </form>

            <div class="login-footer">
                <p><a href="login.html">← Вернуться ко входу</a></p>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="forgot-password.js"></script>
</body>
</html>
