<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{SITE_NAME}}</title>
    <link rel="icon" href="/favicon.ico">
    <style>
        :root {
            --accent: {{ACCENT_COLOR}};
            --bg-dark: #1a1a2e;
            --bg-darker: #16213e;
            --text-light: #eee;
            --text-muted: #889;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--bg-darker);
            padding: 1rem 2rem;
            border-bottom: 2px solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-size: 1.5rem; font-weight: bold; color: var(--accent); }
        nav a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 2rem;
            transition: color 0.3s;
        }
        nav a:hover { color: var(--accent); }

        main { flex: 1; padding: 3rem 2rem; max-width: 1200px; margin: 0 auto; width: 100%; }

        .login-box {
            background: var(--bg-darker);
            padding: 3rem;
            border-radius: 8px;
            max-width: 400px;
            margin: 2rem auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .login-box h2 { text-align: center; margin-bottom: 2rem; color: var(--accent); }
        .login-box input {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            background: var(--bg-dark);
            border: 1px solid var(--accent);
            border-radius: 4px;
            color: var(--text-light);
        }
        .login-box button {
            width: 100%;
            padding: 0.8rem;
            background: var(--accent);
            border: none;
            border-radius: 4px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .files-section { margin-top: 4rem; }
        .files-section h3 { margin-bottom: 1.5rem; }
        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }
        .file-card {
            background: var(--bg-darker);
            padding: 1rem;
            border-radius: 4px;
            border: 1px solid transparent;
            transition: border-color 0.3s;
        }
        .file-card:hover { border-color: var(--accent); }
        .file-card a { color: var(--accent); text-decoration: none; }

        footer {
            background: var(--bg-darker);
            padding: 1.5rem;
            text-align: center;
            color: var(--text-muted);
            border-top: 1px solid #333;
        }
        footer a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
    <header>
        <div class="logo">{{SITE_NAME}}</div>
        <nav>
            <a href="/files/">Files</a>
            <a href="/about">About</a>
            <a href="/contact">Contact</a>
        </nav>
    </header>

    <main>
        <form class="login-box" action="#" method="post">
            <h2>Sign In</h2>
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">Sign In</button>
        </form>

        <section class="files-section">
            <h3>Recent Files</h3>
            <div class="file-grid">
                <div class="file-card"><a href="/files/document.pdf">document.pdf</a></div>
                <div class="file-card"><a href="/files/report.pdf">report.pdf</a></div>
                <div class="file-card"><a href="/files/archive.zip">archive.zip</a></div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; {{COPYRIGHT_YEAR}} {{SITE_NAME}}. All rights reserved.</p>
        <p><a href="/sitemap.xml">Sitemap</a></p>
    </footer>
</body>
</html>
