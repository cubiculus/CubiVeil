<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Стремительный Космос Бокс - Двухфакторная аутентификация</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <span class="logo-icon">📁</span>
                <h1>Стремительный Космос Бокс</h1>
                <p>Двухфакторная аутентификация</p>
            </div>

            <form id="2fa-form" class="login-form">
                <p class="form-description">
                    Введите код из вашего приложения аутентификации
                </p>

                <div class="form-group">
                    <label for="code">Код подтверждения</label>
                    <input type="text" id="code" name="code" maxlength="6" pattern="[0-9]{6}"
                           placeholder="000000" required autocomplete="one-time-code">
                </div>

                <button type="submit" class="btn btn-primary btn-block">Подтвердить</button>

                <div id="error-message" class="error-message" style="display: none;"></div>

                <div class="form-footer">
                    <p><a href="#">Отправить код по SMS</a></p>
                    <p><a href="login.html">← Вернуться ко входу</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="2fa.js"></script>
</body>
</html>
