<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{SITE_NAME}} - {{LOGIN_TITLE}}</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <span class="logo-icon">📁</span>
                <h1>{{SITE_NAME}}</h1>
                <p>{{SITE_TITLE}}</p>
            </div>

            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="username">{{USERS_LABEL}}</label>
                    <input type="text" id="username" name="username" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" name="remember">
                        <span>Запомнить меня</span>
                    </label>
                    <a href="forgot-password.html" class="forgot-link">{{FORGOT_PASSWORD}}</a>
                </div>

                <button type="submit" class="btn btn-primary btn-block">{{LOGIN_BUTTON}}</button>

                <div id="error-message" class="error-message" style="display: none;"></div>
            </form>

            <div class="login-footer">
                <p>Нет аккаунта? <a href="#">Обратитесь к администратору</a></p>
            </div>
        </div>

        <div class="login-info">
            <h2>Добро пожаловать</h2>
            <p>Войдите для доступа к файлам и документам</p>
            <ul>
                <li>✓ Безопасный доступ к данным</li>
                <li>✓ Синхронизация в реальном времени</li>
                <li>✓ Совместная работа</li>
            </ul>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="auth.js"></script>
</body>
</html>
