name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  telegram-bot-tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip

    - name: Run Telegram Bot Tests
      run: |
        cd tests/telegram-bot
        python3 run_tests.py

  shellcheck:
    runs-on: ubuntu-latest
    needs: telegram-bot-tests

    steps:
    - uses: actions/checkout@v4

    - name: Run Shellcheck
      uses: ludeeus/action-shellcheck@v2.0.0
      with:
        severity: warning
        check_together: 'yes'
      env:
        SHELLCHECK_OPTS: --exclude=SC1091,SC2086

  shfmt:
    runs-on: ubuntu-latest
    needs: telegram-bot-tests

    steps:
    - uses: actions/checkout@v4

    - name: Run shfmt
      uses: luizm/action-sh-checker@v0.9.0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SHFMT_OPTS: -i 2 -d  # 2 spaces indent, diff mode
      with:
        sh_checker_shellcheck_disable: true

  bash-n:
    runs-on: ubuntu-latest
    needs: telegram-bot-tests

    steps:
    - uses: actions/checkout@v4

    - name: Check Bash syntax
      run: |
        bash -n install.sh
        bash -n run-tests.sh
        bash -n tests/integration-test.sh

  validate-tests:
    runs-on: ubuntu-latest
    needs: telegram-bot-tests

    steps:
    - uses: actions/checkout@v4

    - name: Validate test scripts
      run: |
        echo "Validating test scripts..."
        test -f tests/integration-test.sh && echo "✓ integration-test.sh exists"
        test -f run-tests.sh && echo "✓ run-tests.sh exists"
        echo "Test scripts validated successfully"

  shell-unit-tests:
    runs-on: ubuntu-latest
    needs: telegram-bot-tests

    steps:
    - uses: actions/checkout@v4

    - name: Run Shell Unit Tests
      run: |
        echo "Running shell unit tests..."
        chmod +x run-tests.sh
        ./run-tests.sh --unit
