name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  shellcheck:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Run Shellcheck
      uses: ludeeus/action-shellcheck@master
      with:
        severity: warning
        check_together: 'yes'
      env:
        SHELLCHECK_OPTS: --exclude=SC1091,SC2086

  shfmt:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Run shfmt
      uses: luizm/action-sh-checker@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SHFMT_OPTS: -i 2 -d  # 2 spaces indent, diff mode
      with:
        sh_checker_shellcheck_disable: true

  bash-n:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Check Bash syntax
      run: |
        bash -n install.sh
        bash -n run-tests.sh
        bash -n tests/integration-tests.sh

  validate-tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Validate test scripts
      run: |
        echo "Validating test scripts..."
        test -f tests/integration-tests.sh && echo "✓ integration-tests.sh exists"
        test -f run-tests.sh && echo "✓ run-tests.sh exists"
        echo "Test scripts validated successfully"
