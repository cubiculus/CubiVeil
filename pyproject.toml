[tool.mypy]
# Максимальная строгость проверок
python_version = "3.10"
strict = true

# Дополнительные строгие флаги
warn_return_any = true
warn_unused_ignores = true
disallow_any_generics = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_configs = true
no_implicit_reexport = true
strict_equality = true
strict_bytes = true

# Путь к файлам для проверки
files = ["bot.py"]

# Исключения для файлов с менее строгими проверками
[[tool.mypy.overrides]]
module = ["bot"]
disallow_any_generics = false


[tool.bandit]
# Конфигурация Bandit для проверки безопасности Python-кода
# https://bandit.readthedocs.io/

# Тесты для запуска (по умолчанию все)
tests = ["B101", "B102", "B103", "B104", "B105", "B106", "B107", "B108",
         "B110", "B112", "B201", "B301", "B302", "B303", "B304", "B305",
         "B306", "B307", "B308", "B310", "B311", "B312", "B313", "B314",
         "B315", "B316", "B317", "B318", "B319", "B320", "B321", "B323",
         "B324", "B401", "B402", "B403", "B404", "B405", "B406", "B407",
         "B408", "B409", "B410", "B411", "B412", "B413", "B501", "B502",
         "B503", "B504", "B505", "B506", "B507", "B508", "B509", "B601",
         "B602", "B603", "B604", "B605", "B606", "B607", "B608", "B609",
         "B610", "B611", "B701", "B702", "B703"]

# Уровень логирования
level = "HIGH"

# Формат вывода
format = "screen"

# Файлы для проверки
targets = ["bot.py"]

# Исключить директории
exclude_dirs = ["tests", ".venv", "venv", "__pycache__"]
