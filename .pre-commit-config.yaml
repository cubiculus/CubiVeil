# Pre-commit конфигурация для CubiVeil
# https://pre-commit.com/

default_stages: [pre-commit]

repos:
  # ============================================
  # БАЗОВЫЕ ПРОВЕРКИ (быстрые и обязательные)
  # ============================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-json
      - id: check-yaml
        args: ['--unsafe']
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: requirements-txt-fixer

  # ============================================
  # ПРОВЕРКА BASH-СКРИПТОВ
  # ============================================

  # Shellcheck - статический анализ Bash-скриптов
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: ['--exclude=SC1091,SC2086,SC2126,SC2012,SC2005,SC2329,SC2016,SC2153,SC2269,SC2046,SC2129']
        exclude: ^tests/|^lib/|^utils/|^lib/modules/

  # Проверка синтаксиса Bash (только основные скрипты)
  - repo: local
    hooks:
      - id: bash-n
        name: Bash syntax check
        entry: bash -n
        language: system
        types: [shell]
        files: ^(install\.sh|install-modular\.sh|migrate-to-modular\.sh|setup-telegram\.sh|lang\.sh|run-tests\.sh)$
        require_serial: true

  # ============================================
  # ПРОВЕРКА PYTHON-КОДА (только Telegram-бот)
  # ============================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-ast
        files: ^assets/telegram-bot/

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: ['-iii', '-f', 'screen']
        files: ^assets/telegram-bot/
